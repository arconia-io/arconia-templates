name: Release

on:
  workflow_dispatch:

env:
  FLOX_DISABLE_METRICS: true
  REGISTRY: ghcr.io
  VERSION: latest

permissions:
  contents: read

jobs:
  package:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Package
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Flox
        uses: flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f # v2.5.1

      - name: Login to Docker
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}

      - name: Build and publish Template OCI artifacts
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task templates:publish VERSION=${{ env.VERSION }}

      - name: Sign Template OCI artifacts
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task templates:sign VERSION=${{ env.VERSION }}

      - name: Build and publish Template Catalog OCI artifact
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task catalog:publish VERSION=${{ env.VERSION }}

      - name: Sign Template Catalog OCI artifact
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task catalog:sign VERSION=${{ env.VERSION }}
