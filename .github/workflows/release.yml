name: Release

on:
  workflow_dispatch:

env:
  FLOX_DISABLE_METRICS: true
  REGISTRY: ghcr.io
  VERSION: latest

permissions:
  contents: read

jobs:
  package:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Package
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Flox
        uses: flox/install-flox-action@c94e7e1ab56ae14fe98bae4fd84384fd135f0c2a # v2.4.0

      - name: Login to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}

      - name: Build and publish Template OCI artifacts
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task templates:publish VERSION=${{ env.VERSION }}

      - name: Sign Template OCI artifacts
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task templates:sign VERSION=${{ env.VERSION }}

      - name: Build and publish Template Catalog OCI artifact
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task catalog:publish VERSION=${{ env.VERSION }}

      - name: Sign Template Catalog OCI artifact
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: task catalog:sign VERSION=${{ env.VERSION }}
