plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.5'
	id 'io.spring.dependency-management' version '1.1.7'
    id 'org.cyclonedx.bom' version '3.2.4'
    id 'org.graalvm.buildtools.native' version '0.11.5'
}

group = "com.example"
version = "0.0.1-SNAPSHOT"

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
	mavenCentral()
}

ext {
    set("arconiaVersion", "0.25.0")
    set("jobRunrVersion", "8.5.2")
    set('springAiVersion', "2.0.0-M4")
}

dependencies {
    implementation "org.springframework.boot:spring-boot-starter-actuator"
    implementation "org.springframework.boot:spring-boot-starter-data-jdbc"
    implementation "org.springframework.boot:spring-boot-starter-flyway"
    implementation "org.springframework.boot:spring-boot-starter-webmvc"
    implementation "org.flywaydb:flyway-database-postgresql"

    implementation "org.springframework.ai:spring-ai-starter-model-ollama"
    implementation "org.springframework.ai:spring-ai-starter-vector-store-pgvector"
    //implementation "org.springframework.ai:spring-ai-advisors-vector-store"
    implementation "org.springframework.ai:spring-ai-rag"

    implementation "org.jobrunr:jobrunr-spring-boot-4-starter:${jobRunrVersion}"

    implementation "io.arconia:arconia-ai-docling-document-reader"
    implementation "io.arconia:arconia-opentelemetry-spring-boot-starter"
    implementation "io.arconia:arconia-openinference-semantic-conventions"
    implementation "net.ttddyy.observation:datasource-micrometer-spring-boot"

    runtimeOnly "org.postgresql:postgresql"

    developmentOnly "org.springframework.boot:spring-boot-devtools"
    testAndDevelopmentOnly "io.arconia:arconia-dev-services-docling"
    testAndDevelopmentOnly "io.arconia:arconia-dev-services-phoenix"
    testAndDevelopmentOnly "io.arconia:arconia-dev-services-postgresql"

    testImplementation "org.springframework.boot:spring-boot-starter-actuator-test"
    testImplementation "org.springframework.boot:spring-boot-starter-data-jdbc-test"
    testImplementation "org.springframework.boot:spring-boot-starter-flyway-test"
    testImplementation "org.springframework.boot:spring-boot-starter-webmvc-test"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

dependencyManagement {
    imports {
        mavenBom "io.arconia:arconia-bom:${arconiaVersion}"
        mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
    }
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.add("-parameters")
}

tasks.named("test") {
	useJUnitPlatform()
}

tasks.named("bootBuildImage") {
    builder = "docker.io/paketobuildpacks/builder-noble-java-tiny"
}
